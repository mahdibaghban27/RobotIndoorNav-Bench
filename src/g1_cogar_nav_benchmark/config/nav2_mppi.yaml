map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      how_many_linear_samplers: 1
      how_many_angular_samplers: 1
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_server_timeout: 20
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
    default_nav_to_pose_bt_xml: "<NAV_TO_POSE_BT_XML>"
    default_nav_through_poses_bt_xml: "<NAV_TO_POSE_BT_XML>"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPathMPPI"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.015
      movement_time_allowance: 45.0

    goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 3.14159
      trans_stopped_velocity: 0.02
      rot_stopped_velocity: 0.05

    FollowPathMPPI:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.60
      forward_sampling_distance: 0.45
      rotate_to_heading_angular_vel: 0.45
      max_angular_accel: 0.80
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false
      closed_loop: true

      time_steps: 48
      model_dt: 0.1
      batch_size: 1000
      vx_std: 0.15
      wz_std: 0.30
      vx_max: 0.18
      vx_min: 0.0
      wz_max: 0.45
      ax_max: 0.35
      ax_min: -0.35
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.3
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic

      ConstraintCritic.cost_power: 1
      ConstraintCritic.cost_weight: 4.0
      GoalCritic.cost_power: 1
      GoalCritic.cost_weight: 6.0
      GoalAngleCritic.cost_power: 1
      GoalAngleCritic.cost_weight: 1.0
      CostCritic.cost_power: 1
      CostCritic.cost_weight: 4.0
      PathAlignCritic.cost_power: 1
      PathAlignCritic.cost_weight: 10.0
      PathFollowCritic.cost_power: 1
      PathFollowCritic.cost_weight: 6.0
      PathAngleCritic.cost_power: 1
      PathAngleCritic.cost_weight: 1.0
      PreferForwardCritic.cost_power: 1
      PreferForwardCritic.cost_weight: 5.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      robot_radius: 0.43
      footprint: "[[0.36, 0.24], [0.36, -0.24], [-0.36, -0.24], [-0.36, 0.24]]"
      footprint_padding: 0.02
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        footprint_clearing_enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          raytrace_min_range: 0.10
          obstacle_max_range: 5.5
          raytrace_max_range: 6.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.42
        cost_scaling_factor: 5.0

      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 8.0
      publish_frequency: 4.0
      width: 4
      height: 4
      resolution: 0.05
      rolling_window: true
      robot_radius: 0.43
      footprint: "[[0.36, 0.24], [0.36, -0.24], [-0.36, -0.24], [-0.36, 0.24]]"
      footprint_padding: 0.02
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        footprint_clearing_enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          raytrace_min_range: 0.10
          obstacle_max_range: 3.5
          raytrace_max_range: 4.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.42
        cost_scaling_factor: 5.5

      always_send_full_costmap: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    stop_on_failure: true

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    velocity_timeout: 0.20
    deadband_velocity: [0.01, 0.0, 0.01]
    max_velocity: [0.18, 0.0, 0.45]
    min_velocity: [-0.08, 0.0, -0.45]
    max_accel: [0.35, 0.0, 0.6]
    max_decel: [-0.35, 0.0, -0.6]
    odom_topic: "/odom"
    cmd_vel_in_topic: "/nav_cmd_vel"
    cmd_vel_out_topic: "/cmd_vel"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - velocity_smoother

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names:
      - map_server