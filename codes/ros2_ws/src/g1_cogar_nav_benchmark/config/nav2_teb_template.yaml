# Template profile for TEB.
# IMPORTANT:
#   - TEB is NOT included in the core Nav2 humble release packages.
#   - Replace the plugin class below with the exact class name of the ROS2/Humble-compatible TEB plugin
#     provided by your lab environment before using this file.
#   - The rest of this file reuses the same costmaps and lifecycle setup as the DWB/MPPI profiles.

include_from: nav2_dwb.yaml

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPathTEB"]
    FollowPathTEB:
      plugin: "<SET_THE_TEB_PLUGIN_CLASS_HERE>"
      max_vel_x: 0.45
      max_vel_theta: 1.0
      acc_lim_x: 0.8
      acc_lim_theta: 1.2
      footprint_model:
        type: "polygon"
        vertices: [[0.20, 0.12], [0.20, -0.12], [-0.20, -0.12], [-0.20, 0.12]]
      allow_init_with_backwards_motion: false
      global_plan_overwrite_orientation: true
      max_global_plan_lookahead_dist: 3.0
      min_obstacle_dist: 0.18
      inflation_dist: 0.35
      dynamic_obstacle_inflation_dist: 0.50
      include_dynamic_obstacles: true
      weight_obstacle: 50.0
      weight_kinematics_forward_drive: 10.0
      weight_optimaltime: 1.0
