scenarios:
  corridor:
    world: ../worlds/corridor.world
    map_yaml: ../maps/corridor.yaml
    topological_graph: topological_corridor.yaml
    start_pose: [1.2, 3.0, 0.0]
    goal_pose: [10.8, 3.0, 0.0]
    start_area: corridor_start
    goal_area: corridor_goal
    description: Straight corridor traversal with no decision ambiguity.
    notes: Baseline timing and path efficiency scenario.

  doorway:
    world: ../worlds/doorway.world
    map_yaml: ../maps/doorway.yaml
    topological_graph: topological_doorway.yaml
    start_pose: [2.0, 3.0, 0.0]
    goal_pose: [9.0, 4.5, 0.7]
    start_area: room_a
    goal_area: room_b
    description: Two rooms connected by a narrow doorway with a slightly offset goal.
    notes: Good for assessing controller behavior near tight clearances and final turning behavior.

  clutter:
    world: ../worlds/clutter.world
    map_yaml: ../maps/clutter.yaml
    topological_graph: topological_clutter.yaml
    start_pose: [1.5, 1.5, 0.0]
    goal_pose: [10.5, 6.5, 0.0]
    start_area: clutter_start
    goal_area: clutter_goal
    description: Cluttered office-like environment with multiple obstacle clusters.
    notes: Stresses local obstacle avoidance and path smoothness.

  blockage:
    world: ../worlds/blockage.world
    map_yaml: ../maps/blockage.yaml
    topological_graph: topological_blockage.yaml
    start_pose: [1.5, 3.0, 0.0]
    goal_pose: [10.0, 3.0, 0.0]
    start_area: block_start
    goal_area: block_goal
    description: Corridor with a known partial blockage and an oscillating dynamic blocker.
    dynamic_obstacles: true
    notes: Recovery-behavior benchmark with both static and dynamic blockage.

  house:
    world: ../worlds/house.world
    map_yaml: ../maps/house.yaml
    topological_graph: topological_blockage.yaml
    start_pose: [1.5, 2.0, 0.0]
    goal_pose: [9.5, 6.5, 0.0]
    start_area: living_room
    goal_area: bedroom
    description: Multi-room house layout requiring navigation through interior doorways.
    notes: Tests path planning in a realistic indoor environment with narrow door passages.

  house_dynamic:
    world: ../worlds/house_dynamic.world
    map_yaml: ../maps/house_dynamic.yaml
    start_pose: [1.5, 2.0, 0.0]
    goal_pose: [7.03, 6.00, -3.07]
    start_area: living_room
    goal_area: bedroom
    description: House with dynamic door swap at t=20s — original door blocked, purple door opens.
    dynamic_obstacles: true
    dynamic_obstacle_cmd: house_dynamic_obstacle_commander.py
    notes: Tests replanning under a sudden path blockage requiring rerouting through alternative door.

  maze:
    world: ../worlds/maze.world
    map_yaml: ../maps/maze.yaml
    start_pose: [1.0, 1.0, 0.0]
    goal_pose: [10.5, 7.0, 0.0]
    start_area: maze_start
    goal_area: maze_goal
    description: Complex maze environment requiring navigation through multiple narrow corridors.
    notes: Tests global path planning and local obstacle avoidance in a highly constrained maze layout.

  multi_goal:
    world: ../worlds/multigoal.world
    map_yaml: ../maps/multigoal.yaml
    topological_graph: topological_multi_goal.yaml
    start_pose: [1.2, 1.2, 0.0]
    goal_pose: [10.8, 7.0, 0.0]
    start_area: lobby
    goal_area: exit
    description: Multi-stage route following through a sequence of connected areas.
    use_topological_route: true
    notes: Uses the topological planner to generate intermediate waypoints before execution.
