profiles:
  dwb:
    params_file: nav2_dwb.yaml
    controller_id: FollowPathDWB
    builtin: true
    description: Conservative baseline DWB controller.
  mppi:
    params_file: nav2_mppi.yaml
    controller_id: FollowPathMPPI
    builtin: true
    description: Predictive MPPI controller from core Nav2.
  teb:
    params_file: nav2_teb.yaml
    controller_id: FollowPathTEB
    builtin: false
    description: External TEB plugin profile; set teb_plugin_class to the installed ROS2/Humble Nav2-compatible TEB controller plugin.
